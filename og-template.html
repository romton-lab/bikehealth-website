<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F4EFE6;
      --text: #3D2B1A;
      --muted: #7A6E5E;
      --accent: #B85E28;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 72px 80px;
      gap: 56px;
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      max-width: 640px;
    }

    .eyebrow {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
    }

    h1 {
      font-size: 72px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 32px;
    }

    .accent-line {
      width: 64px;
      height: 4px;
      background: var(--accent);
      margin-bottom: 32px;
    }

    .sub {
      font-size: 22px;
      line-height: 1.45;
      color: var(--muted);
      max-width: 520px;
      font-weight: 400;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .brand img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: block;
    }

    .right {
      flex: 0 0 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone {
      width: 280px;
      background: linear-gradient(160deg, #2a1f15 0%, #1a120a 100%);
      border-radius: 38px;
      padding: 10px;
      transform: rotate(6deg);
      box-shadow:
        0 40px 80px rgba(61, 43, 26, 0.22),
        0 16px 28px rgba(61, 43, 26, 0.10);
    }

    .phone img {
      width: 100%;
      display: block;
      border-radius: 28px;
    }
  </style>
</head>
<body>
  <main>
    <section class="left">
      <div>
        <div class="eyebrow">Application Android</div>
        <h1>Anticipe l'usure de ton vélo.</h1>
        <div class="accent-line"></div>
        <div class="sub">Ton compagnon qui surveille tes composants en silence et t'alerte au bon moment.</div>
      </div>
      <div class="brand">
        <img src="assets/logo-72.png" alt="">
        <span>BikeHealth</span>
      </div>
    </section>

    <section class="right">
      <div class="phone">
        <img src="assets/app-screenshot.jpg" alt="">
      </div>
    </section>
  </main>
</body>
</html>
